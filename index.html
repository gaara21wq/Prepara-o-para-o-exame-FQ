<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Exames — Física e Química A</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --paper:#f6f3ec;
    --ink:#1d2421;
    --ink-faint:#6b716c;
    --rule:#d8d1bd;
    --mech:#2f5d50;
    --ondas:#7a3b2e;
    --eletr:#1f4e79;
    --quim:#8a5a16;
    --accent:#c8552d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  a{color:inherit;}

  header{
    border-bottom:2px solid var(--ink);
    padding:30px 24px 20px;
    max-width:900px; margin:0 auto;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:.12em; color:var(--accent);
  }
  h1{font-size:30px; font-weight:700; margin:6px 0 4px; letter-spacing:-0.01em;}
  .tagline{font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--ink-faint);}

  main{max-width:900px; margin:0 auto; padding:10px 24px 80px;}

  .toc{
    display:flex; flex-wrap:wrap; gap:6px 18px;
    padding:18px 0 26px;
    border-bottom:1px dashed var(--rule);
    margin-bottom:8px;
    font-family:'JetBrains Mono',monospace; font-size:13px;
  }
  .toc a{text-decoration:none; color:var(--ink-faint); border-bottom:1px solid transparent;}
  .toc a:hover{color:var(--ink); border-bottom-color:var(--ink);}

  section.tema-section{margin-top:46px;}
  .tema-heading{
    display:flex; align-items:baseline; gap:12px;
    margin-bottom:4px;
  }
  .tema-heading h2{
    font-size:23px; font-weight:700; margin:0;
  }
  .tema-heading .swatch{
    width:11px; height:11px; border-radius:50%;
    display:inline-block; position:relative; top:-1px;
  }
  [data-tema="Mecânica"] .swatch{background:var(--mech);}
  [data-tema="Ondas e Sinais"] .swatch{background:var(--ondas);}
  [data-tema="Eletricidade"] .swatch{background:var(--eletr);}
  [data-tema="Química"] .swatch{background:var(--quim);}

  .tema-sub{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-faint);
    margin:0 0 16px;
  }

  .categoria{margin-bottom:6px; border-bottom:1px solid var(--rule);}
  .categoria-row{
    display:flex; justify-content:space-between; align-items:center; gap:14px;
    padding:13px 4px;
    cursor:pointer;
  }
  .categoria-row:hover .categoria-nome{color:var(--accent);}
  .categoria-nome{font-size:17px; font-weight:600; transition:color .12s ease;}
  .categoria-meta{
    display:flex; align-items:center; gap:14px; flex-shrink:0;
  }
  .categoria-count{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-faint);}
  .toggle-icon{
    font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--ink-faint);
    width:16px; text-align:center;
    transition:transform .15s ease;
  }
  .categoria.open .toggle-icon{transform:rotate(45deg);}

  .questoes-lista{
    max-height:0; overflow:hidden;
    transition:max-height .25s ease;
  }
  .categoria.open .questoes-lista{max-height:4000px;}

  .questao-item{
    padding:14px 4px 18px 4px;
    border-top:1px dotted var(--rule);
  }
  .questao-item:first-child{border-top:none;}
  .questao-ref{
    font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--ink-faint);
    margin-bottom:6px;
  }
  .questao-ref b{color:var(--ink);}
  .questao-enunciado{
    font-size:15.5px; line-height:1.6; margin:0 0 8px;
  }
  .questao-links{font-family:'JetBrains Mono',monospace; font-size:11.5px;}
  .questao-links a{color:var(--accent); text-decoration:none; margin-right:16px;}
  .questao-links a:hover{text-decoration:underline;}

  .search-box{
    margin:18px 0 0;
  }
  .search-box input{
    width:100%; font-family:'JetBrains Mono',monospace; font-size:13px;
    padding:10px 14px; border:1px solid var(--rule); border-radius:3px;
    background:#fff; color:var(--ink);
  }
  .search-box input:focus{outline:2px solid var(--accent); outline-offset:1px;}

  .no-results{font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--ink-faint); padding:16px 4px;}

  footer{
    border-top:2px solid var(--ink); padding:24px; text-align:center;
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-faint);
    max-width:900px; margin:0 auto;
  }
  footer a{color:var(--ink-faint);}

  @media (max-width:600px){
    h1{font-size:24px;}
    .categoria-nome{font-size:15.5px;}
    .questao-enunciado{font-size:14.5px;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">11º ano · exames nacionais</div>
  <h1>Banco de Exames — Física e Química A</h1>
  <div class="tagline">questões compiladas por tema, a partir das provas finais nacionais do IAVE</div>
</header>

<main>
  <div class="search-box">
    <input type="text" id="search" placeholder="Pesquisar por palavra-chave (ex: &quot;equilíbrio&quot;, &quot;refração&quot;, &quot;pilha&quot;)…">
  </div>
  <nav class="toc" id="toc"></nav>
  <div id="conteudo"></div>
</main>

<footer>
  Fonte das provas: <a href="https://iave.pt" target="_blank">IAVE — Instituto de Avaliação Educativa</a>.
  Cobertura atual: 1ª fase, 2ª fase e época especial de 2022 a 2024 — em expansão.
</footer>

<script>
const TEMAS_ORDEM = ["Mecânica", "Ondas e Sinais", "Eletricidade", "Química"];

let QUESTOES = [];

fetch('questoes.json')
  .then(r => r.json())
  .then(data => {
    QUESTOES = data;
    montarIndice();
    renderTudo();
  })
  .catch(() => {
    document.getElementById('conteudo').innerHTML = '<p class="no-results">Não foi possível carregar questoes.json.</p>';
  });

function slug(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'-').toLowerCase();
}

function montarIndice(){
  const toc = document.getElementById('toc');
  toc.innerHTML = TEMAS_ORDEM.map(t => `<a href="#${slug(t)}">${t}</a>`).join('');
}

function agrupar(lista){
  const porTema = {};
  TEMAS_ORDEM.forEach(t => porTema[t] = {});
  lista.forEach(q => {
    if(!porTema[q.tema]) porTema[q.tema] = {};
    if(!porTema[q.tema][q.categoria]) porTema[q.tema][q.categoria] = [];
    porTema[q.tema][q.categoria].push(q);
  });
  return porTema;
}

function renderTudo(termo){
  termo = (termo || '').toLowerCase().trim();
  let lista = QUESTOES;
  if (termo){
    lista = QUESTOES.filter(q => {
      const blob = (q.enunciado + ' ' + q.categoria + ' ' + q.tema + ' ' + q.subtema).toLowerCase();
      return blob.includes(termo);
    });
  }

  const porTema = agrupar(lista);
  const cont = document.getElementById('conteudo');

  if (lista.length === 0){
    cont.innerHTML = '<p class="no-results">Nenhuma questão encontrada com esse termo.</p>';
    return;
  }

  cont.innerHTML = TEMAS_ORDEM.map(tema => {
    const categorias = porTema[tema] || {};
    const nomesCategorias = Object.keys(categorias).sort();
    if (nomesCategorias.length === 0) return '';

    const totalTema = nomesCategorias.reduce((acc, c) => acc + categorias[c].length, 0);

    const linhasCategorias = nomesCategorias.map(cat => {
      const qs = categorias[cat].sort((a,b) => b.ano - a.ano);
      const itens = qs.map(q => `
        <div class="questao-item">
          <div class="questao-ref"><b>${q.ano}</b> · ${q.fase} · item ${q.numero} · ${q.tipo}</div>
          <p class="questao-enunciado">${q.enunciado}</p>
          <div class="questao-links">
            <a href="${q.pdf_enunciado}" target="_blank">enunciado completo ↗</a>
            <a href="${q.pdf_criterios}" target="_blank">critérios de correção ↗</a>
          </div>
        </div>
      `).join('');

      return `
        <div class="categoria" data-cat="${cat}">
          <div class="categoria-row" onclick="this.parentElement.classList.toggle('open')">
            <span class="categoria-nome">${cat}</span>
            <span class="categoria-meta">
              <span class="categoria-count">${qs.length} questão${qs.length===1?'':'ões'}</span>
              <span class="toggle-icon">+</span>
            </span>
          </div>
          <div class="questoes-lista">${itens}</div>
        </div>
      `;
    }).join('');

    return `
      <section class="tema-section" data-tema="${tema}" id="${slug(tema)}">
        <div class="tema-heading">
          <span class="swatch"></span>
          <h2>${tema}</h2>
        </div>
        <p class="tema-sub">${totalTema} questão${totalTema===1?'':'ões'} catalogada${totalTema===1?'':'s'} em ${nomesCategorias.length} categorias</p>
        ${linhasCategorias}
      </section>
    `;
  }).join('');

  // se houver pesquisa ativa, abrir automaticamente todas as categorias com resultados
  if (termo){
    document.querySelectorAll('.categoria').forEach(c => c.classList.add('open'));
  }
}

document.getElementById('search').addEventListener('input', (e) => {
  renderTudo(e.target.value);
});
</script>

</body>
</html>
